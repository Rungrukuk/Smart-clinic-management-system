name: Lint Java Backend

on:
  push:
  pull_request:

jobs:
  lint-java:
    runs-on: ubuntu-latest
    name: Checkstyle Java Linting

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Download Checkstyle
        run: |
          curl -L -o checkstyle.jar \
          https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.1/checkstyle-10.12.1-all.jar

      - name: Run Checkstyle
        run: |
          java -jar checkstyle.jar \
          -c https://raw.githubusercontent.com/checkstyle/checkstyle/checkstyle-10.12.1/src/main/resources/google_checks.xml \
          src/main/java || true
